<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./../settings.css" />
  <link rel="stylesheet" href="notifications.css" />
  <script src="settings.js" defer></script>
  <script src="notifications.js" defer></script>
</head>
<body>

  <div id="settings" class="tab-content">

    <!-- Focus Session Toggle -->
    <div class="session-section">
      <button type="button" id="sessionBtn" class="session-btn">Start Focus Session</button>
    </div>

    <!-- Inactivity Settings -->
    <div class="inactivity-section">
      <label class="toggle-label">
        <input type="checkbox" id="inactivityToggle"> Inactivity alerts
      </label>
      <div class="inactivity-timeout-row">
        <label for="inactivityTimeout">Alert after</label>
        <input type="number" id="inactivityTimeout" min="1" max="120" value="10">
        <span>min</span>
      </div>
    </div>

    <!-- Allowed Sites -->
    <select id="listType" class="list-type-select">
      <option value="whitelist">Whitelist</option>
      <option value="blacklist">Blacklist</option>
    </select>

    <form class="url-form">
      <label for="urlInput">URL</label>
      <input id="urlInput" type="text" placeholder="https://example.com" />
    </form>

    <button type="button" class="add-btn">Add</button>

    <ul class="list-content"></ul>

    <div class="theme-toggle">
      <button type="button" class="light">Light</button>
      <button type="button" class="auto">Auto</button>
      <button type="button" class="dark">Dark</button>
    </div>

  </div>

  <script src="./../settings.js"></script>
</body>
</html>
